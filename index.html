<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#b896ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="가계부" />
    <title>태환❤진주 가계부</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash" style="position:fixed;inset:0;background:#fbfaff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99999;animation:splashFade 0.3s ease 1.4s forwards;">
      <div style="font-size:56px;line-height:1;">💜</div>
      <div style="font-family:'Jua',sans-serif;font-size:22px;color:#b896ff;letter-spacing:0.02em;">우리 가계부</div>
      <div style="width:40px;height:3px;border-radius:99px;background:#e8deff;overflow:hidden;margin-top:8px;">
        <div style="height:100%;width:100%;background:linear-gradient(90deg,#b896ff,#d4b8ff);border-radius:99px;animation:splashBar 1s ease-in-out infinite alternate;"></div>
      </div>
    </div>
    <style>
      @keyframes splashBar { from { transform: translateX(-100%) } to { transform: translateX(100%) } }
      @keyframes splashFade { to { opacity: 0; pointer-events: none; } }
    </style>
    <script>
      window.hideSplash = function() {
        var el = document.getElementById('app-splash')
        if (el) setTimeout(function() { el.remove() }, 1800)
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
